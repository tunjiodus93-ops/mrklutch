<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Adetunji Odusami | Builder & Creator</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fafaf9;
      color: #111827;
      overflow-x: hidden;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      z-index: 1;
      background-image:
        radial-gradient(circle at 20% 20%, #000 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .hero-text {
      line-height: .92;
      letter-spacing: -0.06em;
    }

    .glass-card {
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .soft-shadow {
      box-shadow:
      0 10px 40px rgba(0,0,0,.08);
    }

    .gradient-ring {
      background:
      linear-gradient(135deg,#f59e0b,#111827);
      padding: 4px;
      border-radius: 32px;
    }

    .section-space {
      padding: 8rem 1.5rem;
    }

    @media(max-width:768px){
      .section-space{
        padding:5rem 1.5rem;
      }

      .hero-text{
        line-height:1;
      }
    }
  </style>
</head>

<body>

<div class="grain"></div>

<!-- NAV -->
<header class="fixed top-0 left-0 w-full z-50">
  <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">

    <div class="flex items-center gap-3">
      <img src="klutch-logo.png"
           class="w-11 h-11 object-contain"
           alt="Klutch Logo">

      <div>
        <h2 class="font-bold text-lg">
          Adetunji
        </h2>
        <p class="text-xs text-gray-500">
          Builder • Creator
        </p>
      </div>
    </div>

    <a href="#contact"
      class="bg-black text-white px-6 py-3 rounded-full text-sm hover:bg-orange-500 transition">
      Contact Me
    </a>
  </div>
</header>

<!-- HERO -->
<section class="min-h-screen flex items-center relative overflow-hidden">

  <!-- background shape -->
  <div class="absolute top-[-100px] right-[-80px]
              w-[400px] h-[400px]
              bg-orange-200 rounded-full blur-[120px]
              opacity-50">
  </div>

  <div class="max-w-7xl mx-auto px-6 pt-32 grid lg:grid-cols-2 gap-16 items-center relative z-10">

    <!-- LEFT -->
    <div>

      <div class="inline-flex items-center gap-2
                  bg-white border border-gray-200
                  px-5 py-2 rounded-full mb-8 soft-shadow">

        <div class="w-2 h-2 rounded-full bg-green-500"></div>

        <span class="text-sm text-gray-700">
          Founder of Klutch Konnect
        </span>
      </div>

      <h1 class="hero-text text-[4.2rem] md:text-[7rem] font-bold">

        Building<br>
        ideas into<br>
        <span class="text-orange-500">
          scalable systems
        </span>

      </h1>

      <p class="mt-8 text-xl text-gray-600 max-w-xl leading-relaxed">

        I design systems, brands, and digital
        experiences that turn ambitious ideas
        into real businesses.

      </p>

      <div class="flex flex-wrap gap-4 mt-10">

        <a href="#contact"
          class="bg-black text-white
                 px-8 py-4 rounded-full
                 hover:bg-orange-500 transition">

          Work With Me

        </a>

        <a href="#projects"
          class="border border-gray-300
                 px-8 py-4 rounded-full
                 hover:bg-gray-100 transition">

          View Work

        </a>

      </div>

      <!-- SOCIALS -->
      <div class="flex items-center gap-6 mt-12 text-2xl">

        <a href="https://instagram.com/_tvnji"
          class="hover:text-orange-500 transition">

          <i class="fab fa-instagram"></i>

        </a>

        <a href="https://x.com/_tvnji"
          class="hover:text-orange-500 transition">

          <i class="fab fa-x-twitter"></i>

        </a>

        <a href="https://snapchat.com/add/txnji"
          class="hover:text-orange-500 transition">

          <i class="fab fa-snapchat"></i>

        </a>

      </div>
    </div>

    <!-- RIGHT -->
    <div class="relative flex justify-center">

      <!-- floating card -->
      <div class="absolute top-10 left-0
                  glass-card p-5 rounded-3xl
                  soft-shadow hidden md:block">

        <p class="text-sm text-gray-500">
          Currently Building
        </p>

        <h4 class="font-semibold mt-2">
          Klutch Konnect Ecosystem
        </h4>

      </div>

      <!-- image -->
      <div class="gradient-ring soft-shadow">

        <img src="headshot.jpg"
          alt="Adetunji Odusami"
          class="w-[360px] h-[500px]
                 object-cover rounded-[28px]">

      </div>

    </div>

  </div>
</section>

</body>
</html>
